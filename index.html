<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>灵感日报 | Inspiration Daily</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-card: #1c2333;
      --text-primary: #e6edf3;
      --text-secondary: #9da5b1;
      --accent-blue: #58a6ff;
      --accent-green: #3fb950;
      --accent-purple: #bc8cff;
      --accent-orange: #d29922;
      --border-color: #3d444d;
    }
    
    body.light-mode {
      --bg-primary: #f6f8fa;
      --bg-secondary: #ffffff;
      --bg-card: #ffffff;
      --text-primary: #1f2328;
      --text-secondary: #4a5568;
      --accent-blue: #0969da;
      --accent-green: #1a7f37;
      --accent-purple: #8250df;
      --accent-orange: #9a6700;
      --border-color: #d0d7de;
    }
    
    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      transition: background-color 0.3s, color 0.3s;
    }
    
    .navbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      background-color: var(--bg-secondary) !important;
      border-bottom: 1px solid var(--border-color);
      transition: background-color 0.3s, border-color 0.3s;
    }
    
    .date-selector {
      background-color: var(--bg-card);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 0.5rem 1rem;
      font-size: 0.9rem;
      transition: background-color 0.3s, color 0.3s, border-color 0.3s;
    }
    
    .date-selector:focus {
      border-color: var(--accent-blue);
      outline: none;
      box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.2);
    }
    
    .date-selector option {
      background-color: var(--bg-card);
      color: var(--text-primary);
    }
    
    .stats-card {
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 1.25rem;
      text-align: center;
      transition: background-color 0.3s, border-color 0.3s;
    }
    
    .stats-card.major-event-card {
      cursor: pointer;
    }
    
    .stats-card.major-event-card:hover {
      border-color: #ff6b6b;
      box-shadow: 0 0 0 2px rgba(255, 107, 107, 0.2);
    }
    
    body.light-mode .stats-card.major-event-card:hover {
      border-color: #cf222e;
      box-shadow: 0 0 0 2px rgba(207, 34, 46, 0.15);
    }
    
    body.light-mode .stats-card.major-event-card.active {
      border-color: #cf222e;
      background-color: rgba(207, 34, 46, 0.08);
    }
    
    body.light-mode .stats-card.major-event-card.active .stats-number {
      color: #cf222e;
    }
    
    .stats-card.major-event-card.active {
      border-color: #ff6b6b;
      background-color: rgba(255, 107, 107, 0.1);
    }

    .stats-label {

    .category-tab:hover {

    .category-tab:hover i {

    }
    
    .category-tab.active {

    .source-tag {

    .summary-section {

    .summary-title {

      padding-bottom: 0.5rem;

    .toggle-expand-btn {

    .inspiration-type-badge.industry_insight {

    .back-link {

    }

      color: var(--text-primary);

    .theme-toggle-btn {

      color: var(--accent-blue);
    }
    
    .theme-toggle-btn i {
      color: var(--text-primary);
    }

    body.light-mode .importance-stars .bi-star {

<body>
  <!-- Navbar -->
  <nav class="navbar" id="mainNavbar">

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const DATA_URL = './data/all_inspiration.json';
    
    let allData = [];
    let currentDate = '';
    let currentCategory = 'all';
    let showMajorEventsOnly = false;
    let availableDates = [];

    // Theme management
    let isDarkMode = localStorage.getItem('theme') !== 'light';
    
    function applyTheme() {
      document.body.classList.toggle('light-mode', !isDarkMode);
      document.getElementById('themeIcon').className = isDarkMode ? 'bi bi-moon-fill' : 'bi bi-sun-fill';
      localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
    }
    
    function toggleTheme() {
      isDarkMode = !isDarkMode;
      applyTheme();
    }
    
    applyTheme();

    async function loadData() {
      try {
        const response = await fetch(DATA_URL);
        if (!response.ok) throw new Error('Failed to load data');
        allData = await response.json();
        
        allData = allData.map(item => {
          if (item.category === 'developer_tool' || item.category === 'ai_model') {
            return { ...item, category: 'product_tool' };
          }
          return item;
        });
        
        const dateSet = new Set(allData.map(item => item.date));
        availableDates = Array.from(dateSet).sort().reverse();
        
        const selector = document.getElementById('dateSelector');
        selector.innerHTML = '<option value="">选择日期</option>';
        availableDates.forEach(date => {
          const option = document.createElement('option');
          option.value = date;
          option.textContent = date;
          selector.appendChild(option);
        });
        
        if (currentDate) {
          loadInspiration(currentDate);
        }
      } catch (error) {
        console.error('Error loading data:', error);
        allData = [];
      }
    }

    function getFilteredData() {
      let filtered = allData.filter(item => item.date === currentDate);
      
      filtered = filtered.map(item => {
        if (item.category === 'developer_tool' || item.category === 'ai_model') {
          return { ...item, category: 'product_tool' };
        }
        return item;
      });
      
      if (currentCategory !== 'all') {
        filtered = filtered.filter(item => item.category === currentCategory);
      }
      
      if (showMajorEventsOnly) {
        filtered = filtered.filter(item => item.is_major_event);
      }
      
      return filtered.sort((a, b) => b.importance - a.importance);
    }

    function toggleMajorEvents() {
      showMajorEventsOnly = !showMajorEventsOnly;
      const card = document.getElementById('majorCountCard');
      if (showMajorEventsOnly) {
        card.classList.add('active');
      } else {
        card.classList.remove('active');
      }
      render();
    }

    function getAllDateCategoryCounts() {
      const dayData = allData.filter(item => item.date === currentDate);
      const counts = { ai_tech: 0, startup: 0, product_tool: 0, academic_paper: 0 };
      dayData.forEach(item => {
        let cat = item.category;
        if (cat === 'developer_tool' || cat === 'ai_model') cat = 'product_tool';
        if (counts.hasOwnProperty(cat)) counts[cat]++;
      });
      return counts;
    }

    function getCategoryIcon(category) {
      const icons = {
        'ai_tech': 'cpu',
        'startup': 'rocket-takeoff',
        'product_tool': 'tool',
        'academic_paper': 'journal-text'
      };
      return icons[category] || 'tag';
    }

    function getCategoryLabel(category) {
      const labels = {
        'ai_tech': 'AI 技术',
        'startup': '创业动态',
        'product_tool': '产品工具',
        'academic_paper': '学术论文'
      };
      return labels[category] || category;
    }

    function renderStars(importance) {
      if (importance == null || importance === undefined) importance = 0;
      let stars = '';
      for (let i = 1; i <= 5; i++) {
        stars += i <= importance ? '<i class="bi bi-star-fill"></i>' : '<i class="bi bi-star empty"></i>';
      }
      return stars;
    }

    function updateCategoryTabs() {
      const counts = getAllDateCategoryCounts();
      document.querySelectorAll('.category-tab[data-category]').forEach(tab => {
        const cat = tab.dataset.category;
        const countSpan = tab.querySelector('.cat-count');
        if (countSpan && counts.hasOwnProperty(cat)) {
          countSpan.textContent = counts[cat];
        }
      });
      document.querySelectorAll('.category-tab').forEach(tab => {
        tab.classList.toggle('active', tab.dataset.category === currentCategory);
      });
    }

    function filterByCategory(category) {
      currentCategory = category;
      updateCategoryTabs();
      render();
    }

    function render() {
      const articles = getFilteredData();
      const container = document.getElementById('articlesContainer');
      const emptyState = document.getElementById('emptyState');
      
      if (currentDate) {
        loadInspiration(currentDate);
      } else {
        document.getElementById('inspirationSection').style.display = 'none';
      }
      
      document.getElementById('totalCount').textContent = articles.length;
      document.getElementById('majorCount').textContent = articles.filter(a => a.is_major_event).length;
      document.getElementById('avgImportance').textContent = articles.length > 0 
        ? (articles.reduce((sum, a) => sum + (a.importance || 0), 0) / articles.length).toFixed(1)
        : '0';
      
      updateCategoryTabs();
      
      if (articles.length === 0) {
        container.innerHTML = '';
        emptyState.style.display = 'block';
        return;
      }
      
      emptyState.style.display = 'none';
      
      const grouped = {};
      articles.forEach(article => {
        if (!grouped[article.category]) {
          grouped[article.category] = [];
        }
        grouped[article.category].push(article);
      });
      
      let html = '';
      Object.keys(grouped).forEach(category => {
        const items = grouped[category];
        const maxShow = 5;
        const hasMore = items.length > maxShow;
        const sectionId = 'section-' + category.replace(/[_\s]+/g, '-');
        
        html += `
          <div class="summary-section">
            <div class="summary-title d-flex justify-content-between align-items-center">
              <div class="d-flex align-items-center gap-2">
                <i class="bi bi-${getCategoryIcon(category)}"></i>
                ${getCategoryLabel(category)} (${items.length})
              </div>
              <div class="d-flex align-items-center gap-2">
                ${hasMore ? `<button class="toggle-expand-btn" id="btn-${sectionId}" onclick="toggleSection('${sectionId}', '${sectionId}')" data-expanded="false" title="展开全部"><i class="bi bi-chevron-down"></i></button>` : ''}
              </div>
            </div>
        `;
        
        items.forEach((article, index) => {
          const hidden = index >= maxShow ? ' style="display: none;"' : '';
          html += `
            <div class="card mb-3"${hidden} data-section="${sectionId}">
              <div class="card-body">
                <div class="d-flex justify-content-between align-items-start mb-2">
                  <h5 class="card-title mb-0">
                    <a href="${article.url}" target="_blank" class="article-link">
                      ${article.title}
                    </a>
                  </h5>
                  ${article.is_major_event ? '<span class="major-event-badge">重大事件</span>' : ''}
                </div>
                
                <p class="card-text" style="color: var(--text-secondary); font-size: 0.9rem;">
                  ${article.raw_summary || article.summary || '暂无摘要'}
                </p>
                
                <div class="d-flex justify-content-between align-items-center mt-3">
                  <div class="d-flex align-items-center gap-2">
                    <span class="source-tag">${article.source}</span>
                    <span class="importance-stars">${renderStars(article.importance)}</span>
                  </div>
                  <small class="text-muted">${article.date}</small>
                </div>
                
                ${article.keywords && article.keywords.length > 0 ? `
                  <div class="mt-2">
                    ${article.keywords.map(k => `<span class="keyword-badge me-1" style="font-size: 0.75rem;">${k}</span>`).join('')}
                  </div>
                ` : ''}
              </div>
            </div>
          `;
        });
        
        if (hasMore) {
          html += `
            <div class="text-center mt-3">
              <button class="toggle-expand-btn" id="btn-${sectionId}" onclick="toggleSection('${sectionId}', '${sectionId}')" data-expanded="false" title="展开全部">
                <i class="bi bi-chevron-down"></i>
              </button>
            </div>
          `;
        }
        
        html += '</div>';
      });
      
      container.innerHTML = html;
    }

    let inspirationData = null;

    async function loadInspiration(date) {
      try {
        const resp = await fetch(`./data/inspiration_${date}.json`);
        if (!resp.ok) {
          inspirationData = null;
          document.getElementById('inspirationSection').style.display = 'none';
          return;
        }
        inspirationData = await resp.json();
        renderInspiration();
      } catch (e) {
        inspirationData = null;
        document.getElementById('inspirationSection').style.display = 'none';
      }
    }

    function renderInspiration() {
      if (!inspirationData || !inspirationData.insights || inspirationData.insights.length === 0) {
        document.getElementById('inspirationSection').style.display = 'none';
        return;
      }
      
      const container = document.getElementById('inspirationContainer');
      let html = '';
      
      inspirationData.insights.forEach(insight => {
        if (insight.type === 'industry_insight') {
          html += `
            <div class="inspiration-card industry_insight">
              <div class="d-flex align-items-center gap-2 mb-2">
                <span class="inspiration-type-badge industry_insight">行业洞察</span>
                ${insight.tags ? insight.tags.map(t => `<span class="badge bg-info" style="font-size:0.7rem">${t}</span>`).join('') : ''}
              </div>
              <h6 class="mb-2" style="color: var(--text-primary); font-weight: 600;">${insight.title}</h6>
              <p style="color: var(--text-secondary); font-size: 0.9rem; line-height: 1.6;">${insight.summary}</p>
              ${insight.key_points ? `
                <div class="mt-2">
                  <strong style="font-size: 0.8rem; color: var(--accent-blue);">关键点：</strong>
                  <ul class="mb-0" style="font-size: 0.85rem; color: var(--text-secondary);">
                    ${insight.key_points.map(p => `<li>${p}</li>`).join('')}
                  </ul>
                </div>
              ` : ''}
            </div>
          `;
        } else if (insight.type === 'startup_advice') {
          html += `
            <div class="inspiration-card startup_advice">
              <div class="d-flex align-items-center gap-2 mb-2">
                <span class="inspiration-type-badge startup_advice">创业建议</span>
                ${insight.tags ? insight.tags.map(t => `<span class="badge bg-secondary" style="font-size:0.7rem">${t}</span>`).join('') : ''}
              </div>
              <h6 class="mb-2" style="color: var(--text-primary); font-weight: 600;">${insight.title}</h6>
              <p style="color: var(--text-secondary); font-size: 0.9rem; line-height: 1.6;">${insight.summary}</p>
              ${insight.action_items ? `
                <div class="mt-2">
                  <strong style="font-size: 0.8rem; color: var(--accent-green);">行动建议：</strong>
                  <ul class="mb-0" style="font-size: 0.85rem; color: var(--text-secondary);">
                    ${insight.action_items.map(a => `<li>${a}</li>`).join('')}
                  </ul>
                </div>
              ` : ''}
              ${insight.related_news ? `
                <div class="mt-2" style="font-size: 0.75rem; color: var(--text-secondary);">
                  关联新闻：${insight.related_news.join(', ')}
                </div>
              ` : ''}
            </div>
          `;
        } else if (insight.type === 'side_project') {
          html += `
            <div class="inspiration-card side_project">
              <div class="d-flex align-items-center gap-2 mb-2">
                <span class="inspiration-type-badge side_project">小项目</span>
                <span class="difficulty-badge ${insight.difficulty || 'medium'}">${
                  insight.difficulty === 'easy' ? '🟢 简单' : 
                  insight.difficulty === 'hard' ? '🔴 困难' : '🟡 中等'
                }</span>
                ${insight.estimated_time ? `<span style="font-size: 0.75rem; color: var(--text-secondary);">⏱ ${insight.estimated_time}</span>` : ''}
              </div>
              <h6 class="mb-2" style="color: var(--text-primary); font-weight: 600;">${insight.title}</h6>
              <p style="color: var(--text-secondary); font-size: 0.9rem; line-height: 1.6;">${insight.summary}</p>
              ${insight.tech_stack ? `
                <div class="tech-stack-tags mt-2">
                  ${insight.tech_stack.map(t => `<span class="badge">${t}</span>`).join('')}
                </div>
              ` : ''}
              ${insight.related_news ? `
                <div class="mt-2" style="font-size: 0.75rem; color: var(--text-secondary);">
                  灵感来源：${insight.related_news.join(', ')}
                </div>
              ` : ''}
            </div>
          `;
        }
      });
      
      container.innerHTML = html;
      document.getElementById('inspirationSection').style.display = 'block';
    }

    function toggleSection(sectionId, btnId) {
      const btn = document.getElementById('btn-' + btnId);
      const isExpanded = btn.dataset.expanded === 'true';
      
      const cards = document.querySelectorAll(`.card[data-section="${sectionId}"]`);
      
      cards.forEach((card, index) => {
        if (isExpanded) {
          if (index >= 5) {
            card.style.display = 'none';
          } else {
            card.style.display = 'block';
          }
        } else {
          card.style.display = 'block';
        }
      });
      
      btn.dataset.expanded = isExpanded ? 'false' : 'true';
      if (isExpanded) {
        btn.classList.remove('expanded');
        btn.innerHTML = '<i class="bi bi-chevron-down"></i>';
      } else {
        btn.classList.add('expanded');
        btn.innerHTML = '<i class="bi bi-chevron-up"></i>';
      }
    }

    document.getElementById('dateSelector').addEventListener('change', function(e) {
      if (!e.target.value) {
        // Prevent empty selection - revert to last valid date
        e.target.value = currentDate;
        return;
      }
      currentDate = e.target.value;
      currentCategory = 'all';
      showMajorEventsOnly = false;
      render();
    });

    document.addEventListener('DOMContentLoaded', () => {
      loadData().then(() => {
        if (availableDates.length > 0) {
          currentDate = availableDates[0];
          document.getElementById('dateSelector').value = currentDate;
          render();
        }
      });
    });
    
    // Click navbar blank area to scroll to top
    document.querySelector('.navbar').addEventListener('click', function(e) {
      if (e.target === this || e.target.tagName === 'NAV' || (e.target.classList.contains('container') && e.target === e.currentTarget)) {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    });
  </script>
</body>
</html>
