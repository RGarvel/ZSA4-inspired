<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 模型价格对比仪表盘</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-card: #1c2333;
      --text-primary: #e6edf3;
      --text-secondary: #9da5b1;
      --accent-blue: #58a6ff;
      --accent-green: #3fb950;
      --accent-purple: #bc8cff;
      --accent-orange: #d29922;
      --accent-red: #ff5252;
      --border-color: #30363d;
    }
    
    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      transition: background-color 0.3s, color 0.3s;
    }
    
    body.light-mode {
      --bg-primary: #f6f8fa;
      --bg-secondary: #ffffff;
      --bg-card: #ffffff;
      --text-primary: #1f2328;
      --text-secondary: #4a5568;
      --accent-blue: #0969da;
      --accent-green: #1a7f37;
      --accent-purple: #8250df;
      --accent-orange: #9a6700;
      --accent-red: #cf222e;
      --border-color: #d0d7de;
    }
    
    .navbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      background-color: var(--bg-secondary) !important;
      border-bottom: 1px solid var(--border-color);
      transition: background-color 0.3s, border-color 0.3s;
    }
    
    .navbar-brand span {
      color: var(--text-primary);
    }
    
    /* Unified navbar text styling for both themes */
    .navbar .text-muted,
    .navbar small.text-muted {
      color: var(--text-secondary) !important;
      opacity: 0.8;
    }
    
    .navbar-brand i.bi-bar-chart-line-fill {
      color: var(--accent-blue) !important;
    }
    
    .back-link {
      color: var(--text-primary);
      text-decoration: none;
      padding: 0.5rem 1rem;
      border-radius: 25px;
      font-size: 0.85rem;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: linear-gradient(135deg, rgba(88, 166, 255, 0.1), rgba(188, 140, 255, 0.05));
      border: 1px solid var(--border-color);
      transition: all 0.3s ease;
    }
    
    .back-link:hover {
      color: var(--accent-blue);
      border-color: var(--accent-blue);
      background: linear-gradient(135deg, rgba(88, 166, 255, 0.2), rgba(188, 140, 255, 0.1));
      transform: translateX(-3px);
      box-shadow: 0 2px 8px rgba(88, 166, 255, 0.2);
    }
    
    .back-link i {
      transition: transform 0.3s ease;
    }
    
    /* Navbar text-muted for dark mode visibility */
    .navbar .text-muted {
      color: var(--text-secondary) !important;
    }
    
    /* Force navbar small text to use CSS variable for theme support */
    .navbar small.text-muted {
      color: var(--text-secondary) !important;
      opacity: 0.8;
    }
    
    /* Navbar icon text color fix */
    .navbar-brand i.bi-bar-chart-line-fill {
      color: var(--accent-blue) !important;
    }
    
.back-link:hover i {
      transform: translateX(-2px);
    }

    
    /* Dashboard brand hover: smooth transition to 灵感日报 via JS */
    .brand-switcher {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
    }
    .brand-icon-default, .brand-icon-hover {
      transition: opacity 0.3s ease, transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      font-size: 1.1rem;
    }
    .brand-icon-default {
      color: var(--accent-blue) !important;
    }
    .brand-icon-hover {
      position: absolute;
      left: 0;
      color: var(--accent-orange);
      opacity: 0;
      transform: scale(0.8);
    }
    .brand-text-default, .brand-text-hover {
      font-size: 1rem;
      font-weight: 600;
      white-space: nowrap;
      transition: opacity 0.25s ease;
    }
    .brand-text-default {
      color: var(--text-primary);
    }
    .brand-text-hover {
      position: absolute;
      left: 2rem;
      background: linear-gradient(135deg, var(--accent-orange), var(--accent-purple));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      opacity: 0;
    }
    .brand-switcher:hover .brand-icon-default {
      opacity: 0;
      transform: scale(0.8);
    }
    .brand-switcher:hover .brand-icon-hover {
      opacity: 1;
      transform: scale(1.15) rotate(-8deg);
    }
    .brand-switcher:hover .brand-text-default {
      opacity: 0;
    }
    .brand-switcher:hover .brand-text-hover {
      opacity: 1;
    }
    body.light-mode .brand-icon-hover {
      color: #d29922 !important;
    }
    
    /* Light mode: stronger contrast for navbar text/icons */
    body.light-mode .navbar .navbar-brand span,
    body.light-mode .navbar .back-link,
    body.light-mode .navbar .back-link span {
      color: #1f2328 !important;
    }
    body.light-mode .navbar .back-link:hover {
      color: #0969da !important;
    }
    body.light-mode .navbar .theme-toggle-btn {
      color: #1f2328 !important;
    }
    body.light-mode .navbar .theme-toggle-btn:hover {
      color: #0969da !important;
    }
    body.light-mode .navbar-brand i.bi-bar-chart-line-fill {
      color: #0969da !important;
    }
    body.light-mode .tier-badge.premium {
      background-color: rgba(9, 105, 218, 0.2);
      color: #0969da;
    }
    body.light-mode .tier-badge.standard {
      background-color: rgba(9, 105, 218, 0.15);
      color: #075aa0;
    }
    body.light-mode .tier-badge.budget {
      background-color: rgba(154, 103, 0, 0.2);
      color: #9a6700;
    }
    body.light-mode .tier-badge.free {
      background-color: rgba(26, 127, 55, 0.2);
      color: #1a7f37;
    }
    body.light-mode .keyword-badge {
      background-color: rgba(9, 105, 218, 0.15);
      color: #0969da;
    }
    body.light-mode .recommendation-card {
      background: linear-gradient(135deg, rgba(26, 127, 55, 0.1), rgba(9, 105, 218, 0.08));
      border-color: #1a7f37;
    }
    body.light-mode .control-bar {
      background-color: #ffffff;
      border-color: #d0d7de;
    }
    body.light-mode .chart-container {
      background-color: #ffffff;
      border-color: #d0d7de;
    }
    body.light-mode .data-table {
      border-color: #d0d7de;
    }
    body.light-mode .data-table th {
      background-color: #f6f8fa !important;
    }
    body.light-mode .comparison-panel {
      background-color: #ffffff;
      border-color: #d0d7de;
    }
    .control-bar {
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1.5rem;
    }
    
    .form-select, .form-control {
      background-color: var(--bg-card);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
    }
    
    .form-select:focus, .form-control:focus {
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.2);
    }
    
    .form-select option {
      background-color: var(--bg-card);
      color: var(--text-primary);
    }
    
    .recommendation-card {
      background: linear-gradient(135deg, rgba(63, 185, 80, 0.15), rgba(88, 166, 255, 0.1));
      border: 2px solid var(--accent-green);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      display: none;
    }
    
    .recommendation-card.show {
      display: block;
    }
    
    .comparison-panel {
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1.5rem;
      display: none;
    }
    
    .comparison-panel.show {
      display: block;
    }
    
    .chart-container {
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      height: 400px;
      transition: background-color 0.3s, border-color 0.3s;
    }
    
    .theme-toggle-btn {
      background: none;
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      border-radius: 8px;
      padding: 0.4rem 0.6rem;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 1.1rem;
    }
    
    .theme-toggle-btn:hover {
      border-color: var(--accent-blue);
      background-color: rgba(88, 166, 255, 0.1);
    }
    
    .data-table-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      -ms-overflow-style: auto;
    }
    
    .data-table-wrapper::-webkit-scrollbar {
      height: 6px;
    }
    
    .data-table-wrapper::-webkit-scrollbar-track {
      background: var(--bg-secondary);
      border-radius: 3px;
    }
    
    .data-table-wrapper::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 3px;
    }
    
    .data-table {
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      min-width: 700px;
      width: 100%;
    }
    
    .data-table table {
      margin-bottom: 0;
      background-color: var(--bg-card);
      table-layout: fixed;
      width: 100%;
    }
    
    /* Table header styles — also covered by consolidated rules below */
    .data-table th { cursor: pointer; user-select: none; padding: 12px 8px; }
    .data-table th:hover { background-color: var(--bg-card); }
    .data-table td { vertical-align: middle; padding: 10px 8px; }
    
    .tier-badge {
      font-size: 0.7rem;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-weight: 600;
      text-transform: uppercase;
    }
    
    .tier-badge.premium {
      background-color: rgba(188, 140, 255, 0.2);
      color: var(--accent-purple);
    }
    
    .tier-badge.standard {
      background-color: rgba(88, 166, 255, 0.2);
      color: var(--accent-blue);
    }
    
    .tier-badge.budget {
      background-color: rgba(210, 153, 34, 0.2);
      color: var(--accent-orange);
    }
    
    .tier-badge.free {
      background-color: rgba(63, 185, 80, 0.2);
      color: var(--accent-green);
    }
    
    .quality-score {
      font-weight: 600;
    }
    
    .quality-score.high { color: var(--accent-green); }
    .quality-score.medium { color: var(--accent-orange); }
    .quality-score.low { color: var(--accent-red); }
    
    .compare-btn {
      font-size: 0.8rem;
      padding: 0.25rem 0.5rem;
    }
    
    .compare-selected {
      background-color: var(--accent-blue);
      color: white;
    }
    
    .footer {
      border-top: 1px solid var(--border-color);
      padding: 1.5rem 0;
      margin-top: 3rem;
      color: var(--text-secondary);
      font-size: 0.85rem;
    }
    
    /* Keyword badges for categories */
    .keyword-badge {
      font-size: 0.7rem;
    }
    
    .inspiration-filter-label {
      color: var(--text-secondary);
    }
    .insp-filter-group {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    .insp-btn-active {
      background-color: rgba(188, 140, 255, 0.15) !important;
      border-color: var(--accent-purple) !important;
      color: var(--accent-purple) !important;
    }
    .insp-btn-inactive {
      background-color: var(--bg-card) !important;
      border-color: var(--border-color) !important;
      color: var(--text-secondary);
    }
    
    /* Bootstrap table theme overrides — single consolidated rule set */
    .table > :not(caption) > * > *,
    .data-table td,
    .data-table th {
      background-color: var(--bg-card);
      color: var(--text-primary);
      border-bottom: 1px solid var(--border-color);
      padding: 10px 8px;
      vertical-align: middle;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }
    
    .table > thead > * > *,
    .data-table th {
      background-color: var(--bg-secondary);
      font-weight: 600;
      cursor: pointer;
      user-select: none;
      border-bottom: 2px solid var(--border-color);
    }
    
    .table-hover > tbody > tr:hover > *,
    .data-table tbody tr:hover td {
      background-color: rgba(88, 166, 255, 0.05) !important;
    }
    
    .data-table tbody tr:nth-of-type(even),
    .table > tbody > tr:nth-of-type(even) > td {
      background-color: var(--bg-secondary) !important;
    }
    
    /* Fixed-width container for dashboard */
    .main-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 15px;
    }
    
    @media (max-width: 768px) {
      .chart-container { height: 300px; padding: 1rem; }
      .control-bar .row { margin: 0; }
      .control-bar .col-md-3, .control-bar .col-md-2 { margin-bottom: 0.5rem; }
      .data-table-wrapper { margin: 0 -0.5rem; border-radius: 0; }
      .data-table { min-width: 700px; }
    }
  </style>
</head>
<body>
  <nav class="navbar" id="mainNavbar">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2 brand-switcher" href="https://rgarvel.github.io/ZSA4-inspired/index.html" id="brandLink">
        <i class="bi bi-bar-chart-line-fill brand-icon-default" id="brandIcon"></i>
        <i class="bi bi-lightbulb-fill brand-icon-hover" id="brandIconHover"></i>
        <span class="brand-text-default" id="brandText">AI 模型价格对比仪表盘</span>
        <span class="brand-text-hover" id="brandTextHover">灵感日报</span>
      </a>
      <div class="d-flex align-items-center ms-auto gap-3">
        <small class="text-muted" id="lastUpdated">数据更新于: 加载中...</small>
        <a class="back-link" href="https://rgarvel.github.io/ZSA4-inspired/project/playground/index.html">
          <i class="bi bi-house-door"></i> 返回Playground
        </a>
        <button class="theme-toggle-btn" onclick="toggleTheme()" title="切换亮暗模式">
          <i class="bi bi-moon-fill" id="themeIcon"></i>
        </button>
      </div>
    </div>
  </nav>

  <div class="main-container mt-4">
    <div id="recommendationCard" class="recommendation-card">
      <div class="d-flex align-items-center gap-2 mb-2">
        <i class="bi bi-trophy-fill" style="color: var(--accent-orange); font-size: 1.5rem;"></i>
        <h5 class="mb-0">最佳推荐</h5>
      </div>
      <div id="recommendationContent"></div>
    </div>

    <div id="comparisonPanel" class="comparison-panel">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5><i class="bi bi-columns-gap"></i> 模型对比</h5>
        <button class="btn btn-sm btn-outline-secondary" onclick="clearComparison()">清除对比</button>
      </div>
      <div id="comparisonContent"></div>
    </div>

    <div class="control-bar">
      <div class="row g-3">
        <div class="col-md-3">
          <label class="form-label">🎯 任务类型</label>
          <select class="form-select" id="taskType">
            <option value="">全部任务</option>
            <option value="text">📝 文本对话</option>
            <option value="reasoning">🧠 逻辑推理</option>
            <option value="coding">💻 编码</option>
            <option value="image">🎨 图像生成</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">厂商</label>
          <select class="form-select" id="vendorFilter">
            <option value="all">全部厂商</option>
          </select>
        </div>
        <div class="col-md-2">
          <label class="form-label">Tier</label>
          <select class="form-select" id="tierFilter">
            <option value="all">全部</option>
            <option value="free">免费</option>
            <option value="budget">经济</option>
            <option value="standard">标准</option>
            <option value="premium">高端</option>
          </select>
        </div>
        <div class="col-md-2">
          <label class="form-label">开源</label>
          <select class="form-select" id="sourceFilter">
            <option value="all">全部</option>
            <option value="true">开源</option>
            <option value="false">闭源</option>
          </select>
        </div>
        <div class="col-md-2">
          <label class="form-label">搜索</label>
          <input type="text" class="form-control" id="searchBox" placeholder="模型名称...">
        </div>
        <div class="col-md-2">
          <label class="form-label">&nbsp;</label>
          <button class="btn btn-outline-primary w-100" onclick="resetFilters()">
            <i class="bi bi-arrow-counterclockwise"></i> 重置
          </button>
        </div>
      </div>
    </div>

    <div class="chart-container">
      <canvas id="priceChart"></canvas>
    </div>

    <div class="data-table-wrapper">
      <div class="data-table">
        <table class="table table-hover">
        <thead>
          <tr>
            <th style="width: 5%;">#</th>
            <th style="width: 12%;" onclick="sortBy('name')">模型 <i class="bi bi-arrow-down-up"></i></th>
            <th style="width: 8%;">厂商</th>
            <th style="width: 7%;" onclick="sortBy('tier')">等级 <i class="bi bi-arrow-down-up"></i></th>
            <th style="width: 10%;" onclick="sortBy('input_price_per_1m')">输入价 <i class="bi bi-arrow-down-up"></i></th>
            <th style="width: 10%;" onclick="sortBy('output_price_per_1m')">输出价 <i class="bi bi-arrow-down-up"></i></th>
            <th style="width: 8%;">图像</th>
            <th style="width: 6%;">开源</th>
            <th style="width: 8%;" onclick="sortBy('quality_score')">质量 <i class="bi bi-arrow-down-up"></i></th>
            <th style="width: 10%;" onclick="sortBy('value_score')">💰 性价比 <i class="bi bi-arrow-down-up"></i></th>
            <th style="width: 8%;">用途</th>
            <th style="width: 7%;">对比</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="container text-center">
      <p>AI 模型价格对比仪表盘 © 2026 | 数据每日自动更新</p>
      <p class="mb-0">价格单位: USD per 1M tokens | 图像价格: USD per image</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    let allModels = [];
    let priceChart = null;
    let compareList = [];
    let sortField = 'value_score';
    let sortDirection = 'desc';
    let _sortedModels = [];
    
    // Cached DOM references
    let dom = {};
    
    function cacheDom() {
      if (dom._cached) return;
      dom = { tableBody: $('tableBody'), chartCtx: $('priceChart').getContext('2d'), taskType: $('taskType') };
      dom._cached = true;
    }
    
    // Compare lookup as Set for O(1) instead of Array.includes O(n)
    function getCompareSet() {
      const s = new Set(compareList);
      return s;
    }

    // Theme management
    let isDarkMode = localStorage.getItem('theme') !== 'light';
    
    function applyTheme() {
      if (isDarkMode) {
        document.body.classList.remove('light-mode');
        document.getElementById('themeIcon').className = 'bi bi-moon-fill';
      } else {
        document.body.classList.add('light-mode');
        document.getElementById('themeIcon').className = 'bi bi-sun-fill';
      }
    }
    
    function toggleTheme() {
      isDarkMode = !isDarkMode;
      localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
      applyTheme();
    }

    // Scroll to top when clicking navbar blank area
    document.getElementById('mainNavbar').addEventListener('click', function(e) {
      const target = e.target;
      const isLink = target.tagName === 'A' || target.closest('a');
      const isBtn = target.tagName === 'BUTTON' || target.closest('button');
      if (!isLink && !isBtn) {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    });

    // ── Cached DOM refs ─────────────────────────────────────
    let $el = {}; // Initialized after DOM ready
    
    // Shortcut
    function $(id) { return document.getElementById(id); }

    function cacheDom() {
      if ($el._c) return;
      $el = {
        tableBody: $('tableBody'), chart: $('priceChart'), lastUpdated: $('lastUpdated'),
        taskType: $('taskType'), vendorFilter: $('vendorFilter'),
        tierFilter: $('tierFilter'), sourceFilter: $('sourceFilter'), searchBox: $('searchBox'),
        comparisonPanel: $('comparisonPanel'), comparisonContent: $('comparisonContent'),
        recommendationCard: $('recommendationCard'), recommendationContent: $('recommendationContent')
      };
      $el.chartCtx = $('priceChart').getContext('2d');
      $el._c = true;
    }

    // Register filter listeners AFTER cacheDom populates $el
    function registerFilterListeners() {
      $el.vendorFilter?.addEventListener('change', () => { refreshFilterCache(); renderTable(); updateChart(); refreshRecommendation(); });
      $el.tierFilter?.addEventListener('change', () => { refreshFilterCache(); renderTable(); updateChart(); refreshRecommendation(); });
      $el.searchBox?.addEventListener('input', () => { refreshFilterCache(); renderTable(); updateChart(); refreshRecommendation(); });
      $el.taskType?.addEventListener('change', handleTaskTypeChange);
      $el.sourceFilter?.addEventListener('change', () => { refreshFilterCache(); renderTable(); updateChart(); refreshRecommendation(); });
    }

    // Brand hover handled entirely by CSS transitions (no JS needed)
    
    document.addEventListener('DOMContentLoaded', async () => {
      applyTheme();
      cacheDom();
      registerFilterListeners();
      await loadModels();
      populateVendorFilter();
      refreshFilterCache(); // sync _filterCache with actual DOM values after populateVendorFilter
      renderTable();
    });

    async function loadModels() {
      try {
        const response = await fetch('./data/models.json');
        if (!response.ok) throw new Error('Failed to load data');
        const data = await response.json();
        allModels = data.models;
        if ($el.lastUpdated) $el.lastUpdated.textContent = `数据更新于: ${data.updated_at}`;
      } catch (error) {
        console.error('Error loading data:', error);
      }
    }

    function populateVendorFilter() {
      const vendors = [...new Set(allModels.map(m => m.vendor))].sort();
      const select = $el.vendorFilter;
      for (const vendor of vendors) {
        const opt = document.createElement('option');
        opt.value = opt.textContent = vendor;
        select.appendChild(opt);
      }
    }

    // ── Filter state cached ────────────────────────────────
    let _filterCache = { vendor: 'all', tier: 'all', source: 'all', search: '' };
    
    function refreshFilterCache() {
      _filterCache.vendor = $el.vendorFilter.value;
      _filterCache.tier = $el.tierFilter.value;
      _filterCache.source = $el.sourceFilter.value;
      _filterCache.search = $el.searchBox.value.toLowerCase();
    }
    
    function handleTaskTypeChange() {
      const card = $el.recommendationCard;
      if ($el.taskType.value) {
        updateRecommendation();
        card.classList.add('show');
      } else {
        card.classList.remove('show');
      }
      refreshFilterCache();
      renderTable();
      updateChart();
    }
    
    // Re-render recommendation when filters change
    function refreshRecommendation() {
      if ($el.taskType?.value) updateRecommendation();
    }

    function getFilteredModels() {
      const { vendor, tier, source, search } = _filterCache;
      const taskType = $el.taskType?.value || '';
      const out = [];
      for (const m of allModels) {
        if (vendor !== 'all' && m.vendor !== vendor) continue;
        if (tier !== 'all' && m.tier !== tier) continue;
        if (source !== 'all' && String(m.open_source) !== source) continue;
        if (search && !m.name.toLowerCase().includes(search) && !m.model_id.toLowerCase().includes(search)) continue;
        // If a task type is selected, filter models that support it
        if (taskType && taskType !== '' && m.categories && !m.categories.includes(taskType)) continue;
        out.push(m);
      }
      return out;
    }

    // ── Compare lookup cache (Set for O(1) vs Array.includes O(n)) ──
    let _compareSet = new Set();
    function rebuildCompareSet() { _compareSet = new Set(compareList); }
    
    function renderTable() {
      const models = getFilteredModels();
      
      // Compute value_score for each model based on active task type
      const activeTask = $el.taskType?.value || '';
      for (const m of models) {
        m.value_score = calcValueScore(m, activeTask);
      }
      
      models.sort((a, b) => {
        let va = a[sortField], vb = b[sortField];
        if (sortField === 'name') { va = String(va || '').toLowerCase(); vb = String(vb || '').toLowerCase(); }
        else if (sortField === 'value_score') { va = Number(a.value_score) || 0; vb = Number(b.value_score) || 0; }
        else { va = Number(va) || 0; vb = Number(vb) || 0; }
        if (va < vb) return sortDirection === 'asc' ? -1 : 1;
        if (va > vb) return sortDirection === 'asc' ? 1 : -1;
        return 0;
      });
      
      // Store sorted models for chart sync
      _sortedModels = models;
      
      // Build HTML using Array.join (O(n) vs O(n²) += concatenation)
      const cs = _compareSet;
      const parts = [];
      
      for (let i = 0; i < models.length; i++) {
        const m = models[i];
        const q = m.quality_score;
        const qc = q >= 90 ? 'high' : q >= 75 ? 'medium' : 'low';
        const ic = cs.has(m.model_id);
        
        parts.push('<tr><td>', i + 1, '</td>');
        parts.push('<td><strong>', m.name, '</strong></td>');
        parts.push('<td>', m.vendor, '</td>');
        parts.push('<td><span class="tier-badge ', m.tier, '">', m.tier, '</span></td>');
        parts.push('<td>$', fmtPrice(m.input_price_per_1m), '</td>');
        parts.push('<td>$', fmtPrice(m.output_price_per_1m), '</td>');
        parts.push('<td>', fmtImgPrice(m.image_generation_price), '</td>');
        parts.push('<td style="text-align:center;">' + (m.open_source ? '<span class="badge bg-success">开源</span>' : '<span class="badge bg-secondary">闭源</span>') + '</td>');
        parts.push('<td><span class="quality-score ', qc, '">', q, '</span></td>');
        // Value-for-money score (color-coded)
        const vs = m.value_score != null ? Number(m.value_score) : 0;
        const vc = vs >= 70 ? 'high' : vs >= 50 ? 'medium' : 'low';
        parts.push('<td><span class="quality-score ', vc, '" title="性价比评分">💰', vs, '</span></td>');
        parts.push('<td>', m.categories.slice(0, 3).map(cat => '<span class="keyword-badge" style="font-size:0.65rem">' + cat + '</span>').join(''), '</td>');
        parts.push('<td><button class="btn btn-sm compare-btn ', ic ? 'compare-selected' : 'btn-outline-secondary', '" onclick="toggleCompare(\'', m.model_id, '\')">');
        parts.push(ic ? '<i class="bi bi-check"></i>' : '+');
        parts.push('</button></td></tr>');
      }
      
      $el.tableBody.innerHTML = parts.join('');
      updateChart();
    }
    
    function fmtPrice(price) {
      if (price == null || price === '' || isNaN(Number(price))) return '/';
      if (price === '/' || Number(price) === 0) return '免费';
      return Number(price).toFixed(2);
    }
    
    function fmtImgPrice(price) {
      if (price == null || price === '' || isNaN(Number(price))) return '/';
      if (price === '/' || Number(price) === 0) return '免费';
      return '$' + Number(price).toFixed(2);
    }
    
    // Legacy aliases (kept for backward compat)
    function formatPrice(p) { return fmtPrice(p); }
    function formatImagePrice(p) { return fmtImgPrice(p); }
    
    function sortBy(field) {
      if (sortField === field) {
        sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
      } else {
        sortField = field;
        sortDirection = field === 'name' ? 'asc' : 'desc';
      }
      renderTable();
      updateChart();
    }
    
    function toggleCompare(modelId) {
      const idx = compareList.indexOf(modelId);
      if (idx > -1) {
        compareList.splice(idx, 1);
        rebuildCompareSet();
      } else {
        if (compareList.length >= 4) { alert('最多同时对比 4 个模型'); return; }
        compareList.push(modelId);
        rebuildCompareSet();
      }
      renderTable();
      renderComparison();
    }

    function renderComparison() {
      const panel = $el.comparisonPanel;
      const content = $el.comparisonContent;
      
      if (compareList.length === 0) { panel.classList.remove('show'); return; }
      
      panel.classList.add('show');
      
      // Lookup models by id using a Set for O(1) instead of filter+includes
      const ids = new Set(compareList);
      const models = [];
      for (const m of allModels) { if (ids.has(m.model_id)) models.push(m); }
      
      const rows = [
        ['厂商', 'vendor'], ['输入价', 'input_price_per_1m'], ['输出价', 'output_price_per_1m'],
        ['图像生成', 'image_generation_price'], ['图像编辑', 'image_edit_price'],
        ['上下文窗口', 'context_window'], ['质量评分', 'quality_score'], ['性价比评分', 'value_score'],
        ['开源/闭源', 'open_source'], ['等级', 'tier']
      ];
      
      const parts = [];
      parts.push('<div class="table-responsive"><table class="table table-sm"><thead><tr><th>模型</th>');
      for (const m of models) parts.push('<th>', String(m.name || ''), '</th>');
      parts.push('</tr></thead><tbody>');
      
      // Render modality scores first if available
      for (const [label, key] of [['文本', 'text'], ['推理', 'reasoning'], ['编码', 'coding'], ['图像', 'image']]) {
        parts.push('<tr><td><strong>', label, '</strong></td>');
        for (const m of models) {
          const ms = m.modality_scores;
          v = (ms && ms[key] != null) ? ms[key] : '-';
          parts.push('<td>', v, '</td>');
        }
        parts.push('</tr>');
      }
      
      for (const [label, key] of rows) {
        parts.push('<tr><td><strong>', label, '</strong></td>');
        for (const m of models) {
          let v = m[key];
          if (key === 'input_price_per_1m' || key === 'output_price_per_1m') {
            v = (v != null && v !== 0) ? '$' + v : '免费';
          } else if (key === 'context_window') {
            v = (v && v > 0) ? Number(v).toLocaleString() + ' tokens' : '-';
          } else if (key === 'tier') {
            v = '<span class="tier-badge ' + String(v || '') + '">' + String(v || '') + '</span>';
          } else if (key === 'quality_score') {
            v = '<span class="quality-score ' + (v >= 90 ? 'high' : v >= 75 ? 'medium' : 'low') + '">' + String(v || '-') + '</span>';
          } else if (key === 'open_source') {
            v = '<span class="' + (v ? 'badge bg-success' : 'badge bg-secondary') + '">' + (v ? '开源' : '闭源') + '</span>';
          } else {
            v = String(v != null ? v : '-');
          }
          parts.push('<td>', v, '</td>');
        }
        parts.push('</tr>');
      }
      
      parts.push('</tbody></table></div>');
      content.innerHTML = parts.join('');
    }

    function clearComparison() {
      compareList = [];
      rebuildCompareSet();
      renderTable();
      renderComparison();
    }

    // ── Cached model index ───────────────────────────────────
    let _modelByIdMap = new Map();
    function buildModelMap() {
      _modelByIdMap.clear();
      for (const m of allModels) _modelByIdMap.set(m.model_id, m);
    }
    
    function updateRecommendation() {
      const taskType = $el.taskType?.value;
      const card = $el.recommendationCard;
      const content = $el.recommendationContent;
      
      if (!taskType) { card.classList.remove('show'); return; }
      
      let candidates = getFilteredModels().filter(m => m.categories.includes(taskType));
      if (!candidates.length) { card.classList.remove('show'); return; }
      
      // Unified scoring: value-for-money based on task type
      candidates = candidates.map(m => ({
        ...m,
        score: calcValueScore(m, taskType)
      }));
      
      candidates.sort((a, b) => b.score - a.score);
      const best = candidates[0];
      
      card.classList.add('show');
      content.innerHTML = `
        <div class="row">
          <div class="col-md-6">
            <h4 class="mb-2">${best.name}</h4>
            <p class="mb-1"><strong>厂商:</strong> ${best.vendor}</p>
            <p class="mb-1"><strong>质量评分:</strong> <span class="quality-score ${best.quality_score >= 90 ? 'high' : best.quality_score >= 75 ? 'medium' : 'low'}">${best.quality_score}</span></p>
            <p class="mb-1"><strong>性价比评分:</strong> <span style="color: var(--accent-green); font-weight: 600;">${best.score}/100</span></p>
          </div>
          <div class="col-md-6">
            <p class="mb-1"><strong>输入价格:</strong> $${fmtPrice(best.input_price_per_1m)}/M tokens</p>
            <p class="mb-1"><strong>输出价格:</strong> $${fmtPrice(best.output_price_per_1m)}/M tokens</p>
            <p class="mb-1"><strong>图像价格:</strong> ${fmtImgPrice(best.image_generation_price)}</p>
            <p class="mb-0"><strong>上下文窗口:</strong> ${best.context_window > 0 ? best.context_window.toLocaleString() + ' tokens' : '-'}</p>
          </div>
        </div>
      `;
    }

    // ── Value-for-money scoring ──────────────────────────────
    function calcValueScore(model, taskType) {
      const modalityScores = model.modality_scores || {};
      const ip = Number(model.input_price_per_1m ?? 0) || 0;
      const op = Number(model.output_price_per_1m ?? 0) || 0;
      const pg = model.image_generation_price;
      
      let score = 0;
      let priceDenom = 0;
      
      if (taskType === 'text' || taskType === 'reasoning') {
        const q = modalityScores[taskType] || modalityScores['text'] || model.quality_score || 50;
        // For text/reasoning: use output price (most expensive part)
        priceDenom = op > 0 ? op : (ip > 0 ? ip : 1);
        score = Math.round((q / priceDenom) * 15); // Scale to ~0-100 range
      } else if (taskType === 'coding') {
        const q = modalityScores['coding'] || modalityScores['text'] || model.quality_score || 50;
        const avgPrice = (ip + op) / 2;
        priceDenom = avgPrice > 0 ? avgPrice : 1;
        score = Math.round((q / priceDenom) * 15);
      } else if (taskType === 'image') {
        const q = modalityScores['image'] || 50;
        if (pg != null && pg !== '/' && Number(pg) > 0) {
          priceDenom = Number(pg);
          score = Math.round((q / priceDenom) * 3);
        } else {
          return 0;
        }
      } else {
        // No task filter: use weighted composite based on quality vs average output price
        const q = model.quality_score || 50;
        priceDenom = op > 0 ? op : (ip > 0 ? ip : 1);
        score = Math.round((q / priceDenom) * 15);
      }
      
      // Clamp to 0-100
      return Math.min(100, Math.max(0, score));
    }

    // ── Chart — single-pass data aggregation ─────────────────
    function calcTaskScore(model, taskType) {
      const wQ = { coding: 0.4, reasoning: 0.6, image: 0.5 }[taskType] || 0.5;
      const wP = 1 - wQ;
      // Use modality-specific score, fall back to composite quality_score
      let qScore = (model.modality_scores && model.modality_scores[taskType]) || model.quality_score;
      
      const ip = Number(model.input_price_per_1m ?? 0) || 0;
      const op = Number(model.output_price_per_1m ?? 0) || 0;
      const pg = model.image_generation_price;
      let priceVal = 0;
      if (taskType === 'coding') { priceVal = (ip + op) / 2; }
      else if (taskType === 'reasoning') { priceVal = op / 2; }
      else if (taskType === 'image') { priceVal = (pg != null && pg !== '/') ? (Number(pg)||0) / 2 : 0; }
      return Math.round((qScore || 0) * wQ + (100 - Math.min(100, priceVal)) * wP);
    }

    function updateChart() {
      if (priceChart) { priceChart.destroy(); }
      
      const taskType = $el.taskType?.value || '';
      const hasTaskFilter = !!taskType;
      
      // Select models: compare > task-sorted / quality-sorted > filtered
      let models = compareList.length > 0
        ? (buildModelMap(), compareList.map(id => _modelByIdMap.get(id)).filter(Boolean))
        : (hasTaskFilter
          ? getFilteredModels().filter(m => m.categories.includes(taskType)).map(m => ({ ...m, score: calcValueScore(m, taskType) })).sort((a,b) => b.score - a.score).slice(0, 10)
          : getFilteredModels().map(m => ({ ...m, score: calcValueScore(m, '') })).sort((a,b) => (b.value_score||0) - (a.value_score||0)).slice(0, 10));
      
      if (!models.length) return;
      
      const perfLabel = { coding: '编码性价比', reasoning: '推理性价比', text: '文本性价比', image: '图像性价比' }[taskType] || '性价比评分';
      
      // Single pass: collect all chart data + compute bounds
      const inputPrices = [], outputPrices = [], scores = [];
      let maxPrice = 0, maxScore = -Infinity, minScore = Infinity;
      
      for (let i = 0; i < models.length; i++) {
        const m = models[i];
        const ip = Number(m.input_price_per_1m ?? 0) || 0, op = Number(m.output_price_per_1m ?? 0) || 0, qs = m.quality_score || 0;
        inputPrices.push(ip);
        outputPrices.push(op);
        const sv = hasTaskFilter ? (m.taskScore != null ? m.taskScore : qs) : qs;
        scores.push(sv);
        if (op > maxPrice) maxPrice = op;
        if (sv > maxScore) maxScore = sv;
        if (sv < minScore) minScore = sv;
      }
      
      const scoreRange = maxScore - minScore;
      const pricePad = Math.max(maxPrice * 0.15, 1);
      const scorePad = Math.max(scoreRange * 0.2, 5);
      
      const datasets = [
        { label: '输入价格 ($/M)', data: inputPrices, backgroundColor: 'rgba(88,166,255,0.6)', borderColor: 'rgba(88,166,255,1)', borderWidth: 1, type: 'bar', yAxisID: 'y', order: 2 },
        { label: '输出价格 ($/M)', data: outputPrices, backgroundColor: 'rgba(210,153,34,0.6)', borderColor: 'rgba(210,153,34,1)', borderWidth: 1, type: 'bar', yAxisID: 'y', order: 2 },
        { label: perfLabel, data: scores, borderColor: 'rgba(63,185,80,1)', backgroundColor: 'rgba(63,185,80,0.1)', borderWidth: 3, type: 'line', pointBackgroundColor: 'rgba(63,185,80,1)', pointBorderColor: '#fff', pointBorderWidth: 2, pointRadius: 5, pointHoverRadius: 8, tension: 0.3, fill: false, yAxisID: 'y1', order: 1 }
      ];
      
      const yMax = Math.ceil((maxPrice + pricePad) / 5) * 5;
      const scoreMin = Math.max(0, Math.floor(minScore - scorePad));
      const scoreMax = Math.ceil((maxScore + scorePad) / 5) * 5;
      
      // Color helpers based on theme
      const dk = isDarkMode;
      const txt = dk ? '#e6edf3' : '#1f2328';
      const muted = dk ? '#8b949e' : '#656d76';
      const grid = dk ? 'rgba(48,54,61,0.5)' : 'rgba(208,215,222,0.5)';
      
      // Cache original colors once
      const origBg = datasets.map(ds => ds.backgroundColor);
      const origBd = datasets.map(ds => ds.borderColor);
      
      priceChart = new Chart($el.chartCtx, {
        type: 'bar',
        data: { labels: models.map(m => m.name), datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: {
              labels: { color: txt, retainFakeColors: false },
              position: 'top',
              onClick: function(e, legendItem, legend) {
                const idx = legendItem.datasetIndex, ci = legend.chart, meta = ci.getDatasetMeta(idx);
                if (!meta.hidden) { meta.hidden = true; legendItem.text = '~~' + legendItem.text + '~~'; }
                else { meta.hidden = false; legendItem.text = legendItem._orig.text || legendItem.text; }
                ci.update();
              }
            },
            tooltip: {
              callbacks: { labelColor: ctx => ({ borderColor: ctx.dataset.borderColor, backgroundColor: ctx.dataset.backgroundColor }) }
            },
            title: {
              display: true,
              text: compareList.length > 0 ? '选中模型对比' : hasTaskFilter ? `性价比排序 (前10) — ${perfLabel}` : '性价比排序 (前10个模型)',
              color: txt,
              font: { size: 16 }
            }
          },
          scales: {
            x: { ticks: { color: muted, maxRotation: 45 }, grid: { color: grid } },
            y: { type: 'linear', display: true, position: 'left', min: 0, max: yMax, title: { display: true, text: '价格 ($/M)', color: txt }, ticks: { color: muted, callback: v => '$' + v }, grid: { color: grid } },
            y1: { type: 'linear', display: true, position: 'right', min: scoreMin, max: scoreMax, title: { display: true, text: perfLabel, color: txt }, ticks: { color: muted }, grid: { drawOnChartArea: false } }
          },
          onHover: function(event, elements) {
            if (this.canvas) this.canvas.style.cursor = elements.length > 0 ? 'pointer' : 'default';
            const active = {};
            elements.forEach(el => active[el.datasetIndex] = true);
            this.data.datasets.forEach((ds, i) => {
              if (active[i]) { ds.backgroundColor = origBg[i]; ds.borderColor = origBd[i]; ds.pointRadius = ds.type === 'line' ? 5 : undefined; if (ds.type === 'line') ds.borderWidth = 3; }
              else if (ds.type === 'line') { ds.borderColor = 'rgba(63,185,80,0.15)'; ds.backgroundColor = 'rgba(63,185,80,0.02)'; ds.pointRadius = 2; ds.borderWidth = 1; }
              else { ds.backgroundColor = 'rgba(128,128,128,0.15)'; ds.borderColor = 'rgba(128,128,128,0.1)'; }
            });
            this.update('none');
          },
          animation: { duration: 300 }
        }
      });
    }

    function resetFilters() {
      $el.vendorFilter.value = 'all';
      $el.tierFilter.value = 'all';
      $el.sourceFilter.value = 'all';
      $el.searchBox.value = '';
      $el.taskType.value = '';
      compareList = [];
      rebuildCompareSet();
      renderTable();
      renderComparison();
      $el.recommendationCard?.classList.remove('show');
    }
  </script>
</body>
</html>
